<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=200">
<title>WebAI Bridge</title>
<style>
  :root {
    --bg:        #1a1a2e;
    --surface:   #16213e;
    --surface2:  #0f3460;
    --accent:    #e94560;
    --accent2:   #533483;
    --text:      #e0e0e0;
    --text-dim:  #888;
    --green:     #4caf50;
    --orange:    #ff9800;
    --red:       #e94560;
    --radius:    8px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 290px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 14px 16px 16px;
  }

  h1 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    letter-spacing: 0.3px;
  }
  h1 .logo {
    width: 18px; height: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* ── 诊断面板 ── */
  .diag-panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .diag-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.ok       { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot.checking { background: var(--orange); }

  .diag-label {
    font-size: 11px;
    color: var(--text-dim);
    width: 70px;
    flex-shrink: 0;
  }
  .diag-val {
    font-size: 11px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .diag-val.err { color: var(--red); }
  .diag-val.ok  { color: var(--green); }

  /* ── 提示框 ── */
  .hint-box {
    background: rgba(233,69,96,0.12);
    border: 1px solid rgba(233,69,96,0.3);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 11px;
    line-height: 1.5;
    color: #f0a0b0;
    margin-bottom: 12px;
    display: none;
  }
  .hint-box.show { display: block; }

  /* ── 表单 ── */
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }

  input[type="text"] {
    width: 100%;
    padding: 7px 10px;
    background: var(--surface);
    border: 1px solid #2a2a4a;
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    font-family: "Cascadia Code", "Consolas", monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent2); }

  /* ── 延迟设置 ── */
  .delay-section {
    margin-top: 12px;
  }
  .delay-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
  }
  .delay-row input[type="number"] {
    width: 62px;
    padding: 6px 8px;
    background: var(--surface);
    border: 1px solid #2a2a4a;
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  .delay-row input[type="number"]:focus { border-color: var(--accent2); }
  .delay-sep { font-size: 11px; color: var(--text-dim); }
  .delay-unit { font-size: 11px; color: var(--text-dim); }
  .delay-preview {
    font-size: 10px;
    color: var(--accent2);
    margin-top: 4px;
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    flex: 1;
    padding: 7px 0;
    border: none;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }

  .btn-save     { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-reconnect{ background: var(--surface2); color: var(--text); }

  /* ── 底部 ── */
  .footer {
    margin-top: 14px;
    text-align: center;
  }
  .footer a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 12px;
  }
  .footer a:hover { color: var(--accent); }

  .toast {
    font-size: 11px;
    text-align: center;
    margin-top: 7px;
    height: 14px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<h1><span class="logo"></span>WebAI Bridge</h1>

<!-- 三级诊断 -->
<div class="diag-panel">
  <div class="diag-row">
    <span class="dot checking" id="dot-sw"></span>
    <span class="diag-label">后台脚本</span>
    <span class="diag-val" id="val-sw">检测中…</span>
  </div>
  <div class="diag-row">
    <span class="dot checking" id="dot-srv"></span>
    <span class="diag-label">本地服务器</span>
    <span class="diag-val" id="val-srv">检测中…</span>
  </div>
  <div class="diag-row">
    <span class="dot checking" id="dot-ws"></span>
    <span class="diag-label">WebSocket桥</span>
    <span class="diag-val" id="val-ws">检测中…</span>
  </div>
  <div class="diag-row">
    <span class="dot checking" id="dot-platform"></span>
    <span class="diag-label">当前平台</span>
    <span class="diag-val" id="val-platform">检测中…</span>
  </div>
</div>

<!-- 错误提示 -->
<div class="hint-box" id="hint-box"></div>

<label>WebSocket 服务器地址</label>
<input type="text" id="server-url" placeholder="ws://localhost:3000" spellcheck="false">

<!-- 延迟设置 -->
<div class="delay-section">
  <label>随机延迟（防检测）</label>
  <div class="delay-row">
    <input type="number" id="delay-min" min="0" max="30000" step="100" value="500">
    <span class="delay-sep">–</span>
    <input type="number" id="delay-max" min="0" max="30000" step="100" value="1500">
    <span class="delay-unit">ms</span>
  </div>
  <div class="delay-preview" id="delay-preview">每次发送前随机延迟 500–1500 ms</div>
</div>

<div class="btn-row">
  <button class="btn-save"      id="btn-save">保存 &amp; 连接</button>
  <button class="btn-reconnect" id="btn-reconnect">重连</button>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <a href="http://localhost:3000" target="_blank">打开聊天界面 →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
