<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAI Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #030308;
      --bg-glass: rgba(20, 20, 35, 0.65);
      --bg-glass-solid: #0e0e1a;
      --border: rgba(255, 255, 255, 0.08);
      --border-bright: rgba(255, 255, 255, 0.14);
      --accent-aurora-1: #00d4aa;
      --accent-aurora-2: #7c3aed;
      --accent-aurora-3: #ec4899;
      --accent-glow: #00ffcc;
      --text: #f0f0f5;
      --text-dim: rgba(255, 255, 255, 0.45);
      --text-muted: rgba(255, 255, 255, 0.6);
      --user-bubble: linear-gradient(135deg, rgba(124, 58, 237, 0.4) 0%, rgba(236, 72, 153, 0.25) 100%);
      --ai-bubble: rgba(30, 30, 50, 0.7);
      --radius: 16px;
      --radius-sm: 10px;
    }

    /* ═══════════════════════════════════════════════════════════════
       AURORA MESH BACKGROUND
    ═══════════════════════════════════════════════════════════════ */
    html, body { height: 100%; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated aurora orbs */
    .aurora-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s ease-in-out infinite;
    }

    .aurora-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent-aurora-1) 0%, transparent 70%);
      top: -200px; left: -100px;
      animation-delay: 0s;
    }

    .aurora-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent-aurora-2) 0%, transparent 70%);
      top: 50%; right: -150px;
      animation-delay: -7s;
    }

    .aurora-orb:nth-child(3) {
      width: 450px; height: 450px;
      background: radial-gradient(circle, var(--accent-aurora-3) 0%, transparent 70%);
      bottom: -100px; left: 30%;
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Subtle noise texture overlay */
    .noise-overlay {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════════ */
    header {
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 20px rgba(0, 212, 170, 0.3);
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-gap { flex: 1; }

    /* Aurora status badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 0 0 transparent;
    }

    .status-dot.ready {
      background: var(--accent-aurora-1);
      box-shadow: 0 0 12px var(--accent-aurora-1), 0 0 24px rgba(0, 212, 170, 0.4);
    }

    .status-dot.loading {
      background: #f59e0b;
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    .status-dot.error {
      background: #ef4444;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
      50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.7); }
    }

    /* Buttons */
    .btn-group { display: flex; gap: 10px; }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn:hover {
      border-color: rgba(0, 212, 170, 0.5);
      color: var(--text);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0, 212, 170, 0.25);
    }

    .btn.primary:hover {
      box-shadow: 0 6px 28px rgba(0, 212, 170, 0.4);
      transform: translateY(-2px);
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ═══════════════════════════════════════════════════════════════
       MESSAGE AREA
    ═══════════════════════════════════════════════════════════════ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      position: relative;
      z-index: 5;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #messages::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

    .msg-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      max-width: 800px;
      width: 100%;
      animation: slide-up 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.ai { align-self: flex-start; }
    .msg-row.error { align-self: flex-start; }

    /* Avatar with glow */
    .avatar {
      width: 38px; height: 38px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
      position: relative;
      overflow: hidden;
    }

    .msg-row.user .avatar {
      background: linear-gradient(135deg, var(--accent-aurora-2), var(--accent-aurora-3));
      color: #fff;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
    }

    .msg-row.ai .avatar {
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.2), rgba(0, 212, 170, 0.05));
      border: 1px solid rgba(0, 212, 170, 0.3);
      color: var(--accent-aurora-1);
      backdrop-filter: blur(10px);
    }

    .msg-row.error .avatar {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    /* Glass bubble */
    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.7;
      max-width: 660px;
      word-break: break-word;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .msg-row.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
    }

    .msg-row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.error .bubble {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles */
    .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
      margin: 12px 0 8px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }
    .bubble h3 { font-size: 16px; }
    .bubble h4 { font-size: 15px; }
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 22px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble strong { color: #fff; font-weight: 600; }
    .bubble em { color: var(--text-dim); font-style: italic; }

    .bubble code {
      background: rgba(0, 212, 170, 0.12);
      color: var(--accent-aurora-1);
      padding: 3px 7px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    }

    .bubble pre {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      margin: 12px 0;
      position: relative;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      color: #e0e0e8;
    }

    .lang-label {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 11px;
      color: var(--text-dim);
      user-select: none;
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .bubble blockquote {
      border-left: 3px solid var(--accent-aurora-1);
      padding-left: 14px;
      color: var(--text-dim);
      margin: 10px 0;
      background: rgba(0, 212, 170, 0.05);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
    }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* Timestamp */
    .ts {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      padding: 0 6px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .msg-row:hover .ts { opacity: 0.7; }

    /* Typing animation */
    .typing-row {
      display: flex;
      align-items: center;
      gap: 14px;
      align-self: flex-start;
    }

    .typing-dots {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 16px 22px;
      display: flex;
      gap: 6px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      border-radius: 50%;
      animation: typing-bounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 70%, 100% { transform: translateY(0); opacity: 0.5; }
      35% { transform: translateY(-10px); opacity: 1; }
    }

    /* Welcome screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    #welcome .big-icon {
      font-size: 64px;
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2), var(--accent-aurora-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 212, 170, 0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(124, 58, 237, 0.6)); }
    }

    #welcome h2 {
      font-size: 26px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #welcome p {
      font-size: 14px;
      max-width: 360px;
      line-height: 1.7;
      color: var(--text-dim);
    }

    /* ═══════════════════════════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════════════════════════ */
    #input-area {
      background: var(--bg-glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    #user-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 180px;
      line-height: 1.5;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #user-input:focus {
      border-color: rgba(0, 212, 170, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
    }

    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      color: #fff;
      border: none;
      border-radius: 14px;
      width: 52px;
      height: 52px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(0, 212, 170, 0.3);
    }

    #send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(0, 212, 170, 0.5);
    }

    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled {
      background: rgba(255, 255, 255, 0.1);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .input-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 8px 0 0;
    }

    .input-hint kbd {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 11px;
    }

    /* ═══════════════════════════════════════════════════════════════
       SYSTEM PROMPT PANEL
    ═══════════════════════════════════════════════════════════════ */
    .sys-btn {
      margin-left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sys-btn:hover {
      background: rgba(0, 212, 170, 0.1);
      color: var(--text);
      border-color: rgba(0, 212, 170, 0.3);
    }

    .sys-btn.active {
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent-aurora-1);
      border-color: rgba(0, 212, 170, 0.4);
    }

    #sys-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.3s;
    }

    #sys-indicator.on {
      background: var(--accent-aurora-1);
      box-shadow: 0 0 8px var(--accent-aurora-1);
    }

    #sys-panel {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: none;
    }

    #sys-panel.show { display: block; }

    #sys-prompt-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      min-height: 84px;
      outline: none;
      transition: all 0.2s;
    }

    #sys-prompt-input:focus {
      border-color: rgba(0, 212, 170, 0.4);
    }

    .sys-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .sys-hint { color: var(--text-dim); font-size: 11px; }

    .sys-save {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-aurora-1), var(--accent-aurora-2));
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sys-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.3);
    }

    .sys-save.saved { background: linear-gradient(135deg, #10b981, #059669); }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
  </div>
  <div class="noise-overlay"></div>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">◈</div>
      WebAI <span>Bridge</span>
    </div>

    <div class="header-gap"></div>

    <div class="status-badge">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">连接中…</span>
    </div>

    <div class="btn-group">
      <button class="btn" id="btn-new-chat" onclick="newChat()" disabled>新对话</button>
    </div>
  </header>

  <!-- System Prompt Panel -->
  <div id="sys-panel">
    <textarea id="sys-prompt-input" placeholder="系统提示词将自动拼在每条外部 API 转发消息前面。留空不启用。最多 4000 字。" maxlength="4000" rows="5"></textarea>
    <div class="sys-row">
      <div class="sys-hint"><span id="sys-char-count">0</span> / 4000 字符</div>
      <button class="sys-save" onclick="saveSystemPrompt()">保存</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div id="welcome">
      <div class="big-icon">✦</div>
      <h2>WebAI Bridge</h2>
      <p id="welcome-desc">等待浏览器插件连接…</p>
    </div>
  </div>

  <!-- Input Area -->
  <div id="input-area">
    <textarea
      id="user-input"
      placeholder="输入消息… (Ctrl+Enter 发送)"
      rows="1"
      disabled
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint"><kbd>Enter</kbd> 换行 &nbsp;·&nbsp; <kbd>Ctrl</kbd>+<kbd>Enter</kbd> 发送</div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // STATE MANAGEMENT
    // ═══════════════════════════════════════════════════════════════
    let isBusy = false;
    let statusInterval = null;

    async function pollStatus() {
      try {
        const r = await fetch('/api/status');
        const data = await r.json();
        updateStatusUI(data);
      } catch {
        updateStatusUI({ status: 'error', error: '无法连接本地服务器' });
      }
    }

    function updateStatusUI({ status, error }) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const input = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const newChatBtn = document.getElementById('btn-new-chat');
      const welcomeDesc = document.getElementById('welcome-desc');

      dot.className = 'status-dot';

      if (status === 'ready') {
        dot.classList.add('ready');
        text.textContent = '插件已连接';
        input.disabled = false;
        sendBtn.disabled = isBusy;
        newChatBtn.disabled = isBusy;
        hideWelcome();
        clearInterval(statusInterval);
        statusInterval = setInterval(pollStatus, 10_000);
      } else if (status === 'no_extension') {
        dot.classList.add('error');
        text.textContent = '插件未连接';
        input.disabled = true;
        sendBtn.disabled = true;
        newChatBtn.disabled = true;
        if (welcomeDesc) {
          welcomeDesc.innerHTML =
            '请安装插件并在 <strong>gemini.google.com</strong> 页面上启用：<br>' +
            '<code style="background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:5px;font-size:13px">' +
            '扮展程序 → 加载已解压的扩展程序 → 选 extension/</code>';
        }
      } else if (status === 'error') {
        dot.classList.add('error');
        text.textContent = '服务器错误';
        input.disabled = true;
        sendBtn.disabled = true;
        newChatBtn.disabled = true;
      } else {
        dot.classList.add('loading');
        text.textContent = '连接中…';
      }
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    // ═══════════════════════════════════════════════════════════════
    // NEW CHAT
    // ═══════════════════════════════════════════════════════════════
    async function newChat() {
      if (isBusy) return;
      setBusy(true);
      try {
        await fetch('/api/new-chat', { method: 'POST' });
        document.getElementById('messages').innerHTML = '';
        shownIds.clear();
        await fetch('/api/history/clear', { method: 'POST' }).catch(() => {});
      } catch (err) {
        appendAiError('新建对话失败：' + err.message);
      } finally {
        setBusy(false);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // SEND MESSAGE
    // ═══════════════════════════════════════════════════════════════
    async function sendMessage() {
      const inputEl = document.getElementById('user-input');
      const text = inputEl.value.trim();
      if (!text || isBusy) return;
      inputEl.value = '';
      autoGrow(inputEl);
      await doSend(text);
    }

    async function doSend(text) {
      setBusy(true);
      hideWelcome();
      appendUserMsg(text);
      const typingEl = appendTyping();
      try {
        const r = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await r.json();
        if (data.id) shownIds.add(data.id);
        typingEl.remove();
        if (!r.ok || data.error) appendAiError(data.error || '请求失败');
        else appendAiMsg(data.text);
      } catch (err) {
        typingEl.remove();
        appendAiError('请求失败：' + err.message);
      } finally {
        setBusy(false);
        document.getElementById('user-input').focus();
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // UI HELPERS
    // ═══════════════════════════════════════════════════════════════
    function setBusy(v) {
      isBusy = v;
      document.getElementById('send-btn').disabled = v;
      document.getElementById('btn-new-chat').disabled = v;
      document.getElementById('user-input').disabled = v;
    }

    function now() {
      return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function appendUserMsg(text, hid) {
      const msgs = document.getElementById('messages');
      const row = createRow('user');
      if (hid) row.dataset.hid = hid;
      row.innerHTML = `
        <div class="avatar">你</div>
        <div>
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="ts">${now()}</div>
        </div>`;
      msgs.appendChild(row);
      scrollBottom();
    }

    function appendAiMsg(text, hid) {
      const msgs = document.getElementById('messages');
      const row = createRow('ai');
      if (hid) row.dataset.hid = hid;
      row.innerHTML = `
        <div class="avatar">◈</div>
        <div>
          <div class="bubble">${renderMarkdown(text)}</div>
          <div class="ts">${now()}</div>
        </div>`;
      msgs.appendChild(row);
      scrollBottom();
    }

    function appendAiError(msg, hid) {
      const msgs = document.getElementById('messages');
      const row = createRow('error');
      if (hid) row.dataset.hid = hid;
      row.innerHTML = `
        <div class="avatar">!</div>
        <div class="bubble">⚠ ${escapeHtml(msg)}</div>`;
      msgs.appendChild(row);
      scrollBottom();
    }

    function appendTyping(hid) {
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'typing-row';
      if (hid) row.dataset.hid = hid;
      row.innerHTML = `
        <div class="avatar">◈</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>`;
      msgs.appendChild(row);
      scrollBottom();
      return row;
    }

    function createRow(type) {
      const d = document.createElement('div');
      d.className = `msg-row ${type}`;
      return d;
    }

    function scrollBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    // ═══════════════════════════════════════════════════════════════
    // MARKDOWN RENDERING
    // ═══════════════════════════════════════════════════════════════
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMarkdown(raw) {
      let s = escapeHtml(raw);

      // Code blocks
      const blocks = [];
      s = s.replace(/```([^\n]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const idx = blocks.length;
        const label = lang ? `<span class="lang-label">${escapeHtml(lang)}</span>` : '';
        blocks.push(`<pre>${label}<code>${code}</code></pre>`);
        return `\x00BLK${idx}\x00`;
      });

      // Inline code
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold / Italic
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Headers
      s = s.replace(/^######\s+(.+)$/gm, '<h4>$1</h4>');
      s = s.replace(/^#####\s+(.+)$/gm, '<h4>$1</h4>');
      s = s.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
      s = s.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^##\s+(.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^#\s+(.+)$/gm, '<h3>$1</h3>');

      // Blockquote
      s = s.replace(/^&gt;\s*(.+)$/gm, '<blockquote>$1</blockquote>');

      // Horizontal rule
      s = s.replace(/^---+$/gm, '<hr>');

      // Unordered list
      s = s.replace(/^[*\-]\s+(.+)$/gm, '<li>$1</li>');
      s = s.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
      s = s.replace(/<\/ul>\s*<ul>/g, '');

      // Ordered list
      s = s.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

      // Paragraphs
      const paragraphs = s.split(/\n\n+/);
      s = paragraphs.map((p) => {
        p = p.trim();
        if (!p) return '';
        if (/^<(h[1-6]|ul|ol|li|pre|blockquote|hr)/.test(p)) return p;
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).filter(Boolean).join('\n');

      // Restore code blocks
      blocks.forEach((b, i) => { s = s.replace(`\x00BLK${i}\x00`, b); });

      return s;
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYBOARD EVENTS
    // ═══════════════════════════════════════════════════════════════
    const input = document.getElementById('user-input');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => autoGrow(input));

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    // ═══════════════════════════════════════════════════════════════
    // SYSTEM PROMPT
    // ═══════════════════════════════════════════════════════════════
    function toggleSysPanel() {
      const p = document.getElementById('sys-panel');
      const btn = document.getElementById('sys-btn');
      const visible = p.classList.contains('show');
      p.classList.toggle('show', !visible);
      btn.classList.toggle('active', !visible);
    }

    async function loadSystemPrompt() {
      try {
        const r = await fetch('/api/system-prompt');
        const { prompt } = await r.json();
        const ta = document.getElementById('sys-prompt-input');
        ta.value = prompt || '';
        updateSysCharCount();
        updateSysIndicator();
      } catch { /* silent */ }
    }

    async function saveSystemPrompt() {
      const ta = document.getElementById('sys-prompt-input');
      const btn = document.querySelector('.sys-save');
      btn.disabled = true;
      try {
        const r = await fetch('/api/system-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: ta.value }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        btn.textContent = '已保存 ✓';
        btn.classList.add('saved');
        setTimeout(() => {
          btn.textContent = '保存';
          btn.classList.remove('saved');
        }, 1500);
        updateSysIndicator();
      } catch (err) {
        btn.textContent = '保存失败 ✗';
        btn.style.background = '#ef4444';
        setTimeout(() => {
          btn.textContent = '保存';
          btn.style.background = '';
        }, 2000);
      } finally {
        btn.disabled = false;
      }
    }

    function updateSysCharCount() {
      const ta = document.getElementById('sys-prompt-input');
      document.getElementById('sys-char-count').textContent = ta.value.length;
    }

    function updateSysIndicator() {
      const ta = document.getElementById('sys-prompt-input');
      const ind = document.getElementById('sys-indicator');
      if (ind) ind.classList.toggle('on', ta.value.trim().length > 0);
    }

    document.getElementById('sys-prompt-input').addEventListener('input', updateSysCharCount);

    // ═══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════
    let shownIds = new Set();

    pollStatus();
    statusInterval = setInterval(pollStatus, 3000);
    loadSystemPrompt();
  </script>
</body>
</html>
